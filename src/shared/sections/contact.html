<section id="contact" class="bg-surface-page px-xl py-5xl lg:px-5xl xl:py-5xl" aria-labelledby="contact-title">
  <div class="mx-auto w-full max-w-screen-xl">
    <div class="relative overflow-hidden rounded-2xl border border-border-inverse bg-surface-page px-lg py-2xl shadow-card sm:px-2xl sm:py-2xl lg:px-3xl lg:py-xl">
      <div class="absolute inset-0 bg-brand-glow opacity-10 pointer-events-none" aria-hidden="true"></div>

      <div class="relative grid w-full items-center gap-xl lg:grid-cols-12">
        <div class="hidden min-w-0 items-center lg:col-span-3 lg:flex" aria-hidden="true">
          <picture class="block w-full">
            <source srcset="images/contact/contact-visual-left.avif 1x, images/contact/contact-visual-left@2x.avif 2x" type="image/avif">
            <source srcset="images/contact/contact-visual-left.webp 1x, images/contact/contact-visual-left@2x.webp 2x" type="image/webp">
            <img
              class="block w-full opacity-60"
              src="images/contact/contact-visual-left.png"
              srcset="images/contact/contact-visual-left.png 1x, images/contact/contact-visual-left@2x.png 2x"
              sizes="(min-width: 1024px) 25vw, 1px"
              width="240"
              height="120"
              alt=""
              loading="lazy"
              decoding="async"
            >
          </picture>
        </div>

        <div class="flex min-w-0 flex-col items-center gap-md text-center lg:col-span-6">
          <div class="flex max-w-screen-md flex-col items-center gap-xs">
            <h2 id="contact-title" class="font-sans text-mobile-h3 text-text-primary sm:text-mobile-h2 lg:text-h4">
              Наведите порядок в релизах
            </h2>
            <p class="text-mobile-small text-text-secondary lg:text-small">
              Подключите Shipline и начните принимать решения на основе данных. Это быстро и не требует изменений в вашей инфраструктуре.
            </p>
          </div>

          <div class="flex w-full flex-col items-center justify-center gap-sm sm:w-auto sm:flex-row">
            <button class="inline-flex w-full sm:w-auto cursor-pointer select-none items-center justify-center gap-xs whitespace-nowrap rounded-md border border-transparent bg-brand-action-vertical px-xl py-sm font-sans text-button font-bold leading-5 text-text-on-brand shadow-button transition duration-200 ease-out motion-reduce:transition-none focus:outline-none focus-visible:bg-brand-action-horizontal focus-visible:shadow-focus hover:bg-brand-action-horizontal active:translate-y-3xs disabled:cursor-not-allowed disabled:shadow-none" type="button" data-demo-trigger>Запросить демо</button>
            <a class="inline-flex w-full sm:w-auto cursor-pointer select-none items-center justify-center gap-xs whitespace-nowrap rounded-md border border-border-brand bg-transparent px-xl py-sm font-sans text-button font-bold leading-5 text-violet-300 transition duration-200 ease-out motion-reduce:transition-none focus:outline-none focus-visible:shadow-focus hover:bg-violet-alpha-12 active:translate-y-3xs active:bg-violet-alpha-16" href="#features">Смотреть возможности</a>
          </div>

          <div class="flex flex-wrap items-center justify-center gap-x-2xl gap-y-xs">
            <a class="inline-flex items-center gap-xs text-small text-text-secondary no-underline transition-colors duration-200 ease-out hover:text-text-brand focus:outline-none focus-visible:rounded-xs focus-visible:shadow-focus" href="mailto:hello@shipline.dev">
              <svg class="h-md w-md shrink-0" viewBox="0 0 24 24" fill="none" aria-hidden="true" focusable="false">
                <use href="icons/sprite.svg#icon-mail"></use>
              </svg>
              <span>hello@shipline.dev</span>
            </a>
            <a class="inline-flex items-center gap-xs text-small text-text-secondary no-underline transition-colors duration-200 ease-out hover:text-text-brand focus:outline-none focus-visible:rounded-xs focus-visible:shadow-focus" href="https://t.me/shipline_dev">
              <svg class="h-md w-md shrink-0" viewBox="0 0 24 24" fill="none" aria-hidden="true" focusable="false">
                <use href="icons/sprite.svg#icon-telegram"></use>
              </svg>
              <span>t.me/shipline_dev</span>
            </a>
            <a class="inline-flex items-center gap-xs text-small text-text-secondary no-underline transition-colors duration-200 ease-out hover:text-text-brand focus:outline-none focus-visible:rounded-xs focus-visible:shadow-focus" href="tel:+79990000000">
              <svg class="h-md w-md shrink-0" viewBox="0 0 24 24" fill="none" aria-hidden="true" focusable="false">
                <use href="icons/sprite.svg#icon-phone"></use>
              </svg>
              <span>+7 (999) 000-00-00</span>
            </a>
          </div>
        </div>

        <div class="hidden min-w-0 items-center lg:col-span-3 lg:flex" aria-hidden="true">
          <picture class="block w-full">
            <source srcset="images/contact/contact-visual-right.avif 1x, images/contact/contact-visual-right@2x.avif 2x" type="image/avif">
            <source srcset="images/contact/contact-visual-right.webp 1x, images/contact/contact-visual-right@2x.webp 2x" type="image/webp">
            <img
              class="block w-full opacity-60"
              src="images/contact/contact-visual-right.png"
              srcset="images/contact/contact-visual-right.png 1x, images/contact/contact-visual-right@2x.png 2x"
              sizes="(min-width: 1024px) 25vw, 1px"
              width="240"
              height="120"
              alt=""
              loading="lazy"
              decoding="async"
            >
          </picture>
        </div>
      </div>
    </div>
  </div>
</section>

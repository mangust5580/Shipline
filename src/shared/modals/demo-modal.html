<div
  class="fixed inset-0 z-60 flex overflow-y-auto items-start justify-center p-xl"
  id="demo-modal"
  role="dialog"
  aria-modal="true"
  aria-labelledby="demo-modal-title"
  hidden
  data-demo-modal
  data-state="closed"
>
  <div class="fixed inset-0 cursor-pointer opacity-0 bg-state-overlay-modal" data-demo-backdrop aria-hidden="true"></div>

  <div class="relative z-1 w-full max-w-screen-sm my-auto p-2xl border border-border-inverse rounded-xl bg-surface-modal shadow-lg cursor-default opacity-0" tabindex="-1" data-demo-panel>

    <div data-demo-form-view>
      <div class="mb-2xl flex items-start justify-between gap-md">
        <div>
          <h2 id="demo-modal-title" class="font-sans text-mobile-h4 text-text-primary lg:text-h5">
            Запросить демо
          </h2>
          <p class="mt-2xs text-small text-text-secondary">
            Расскажите о вашей команде — мы свяжемся в течение 24 часов.
          </p>
        </div>
        <button class="flex h-3xl w-3xl shrink-0 cursor-pointer items-center justify-center rounded-sm border-0 bg-transparent p-0 text-text-muted transition duration-200 ease-out motion-reduce:transition-none hover:bg-white-alpha-08 hover:text-text-primary focus:outline-none focus-visible:shadow-focus" type="button" aria-label="Закрыть" data-demo-close>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true" focusable="false">
            <use href="icons/sprite.svg#icon-close"></use>
          </svg>
        </button>
      </div>

      <form data-demo-form novalidate>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-lg">

          <div class="flex flex-col gap-2xs">
            <label class="block font-sans text-label font-bold text-text-secondary" for="demo-name">
              Имя <span class="text-text-brand" aria-hidden="true">*</span>
            </label>
            <input
              class="w-full px-md py-sm rounded-sm border border-border-inverse bg-surface-elevated font-sans text-body text-text-primary transition duration-200 ease-out motion-reduce:transition-none placeholder:text-text-muted focus:border-border-brand focus:outline-none focus:shadow-focus aria-invalid:border-danger-500 aria-invalid:focus:border-danger-500"
              type="text"
              id="demo-name"
              name="name"
              placeholder="Иван Иванов"
              required
              autocomplete="name"
              aria-describedby="demo-name-error"
            >
            <p id="demo-name-error" class="font-sans text-small text-text-danger" hidden role="alert" data-demo-error></p>
          </div>

          <div class="flex flex-col gap-2xs">
            <label class="block font-sans text-label font-bold text-text-secondary" for="demo-email">
              Рабочий Email <span class="text-text-brand" aria-hidden="true">*</span>
            </label>
            <input
              class="w-full px-md py-sm rounded-sm border border-border-inverse bg-surface-elevated font-sans text-body text-text-primary transition duration-200 ease-out motion-reduce:transition-none placeholder:text-text-muted focus:border-border-brand focus:outline-none focus:shadow-focus aria-invalid:border-danger-500 aria-invalid:focus:border-danger-500"
              type="email"
              id="demo-email"
              name="email"
              placeholder="ivan@company.ru"
              required
              autocomplete="email"
              aria-describedby="demo-email-error"
            >
            <p id="demo-email-error" class="font-sans text-small text-text-danger" hidden role="alert" data-demo-error></p>
          </div>

          <div class="flex flex-col gap-2xs">
            <label class="block font-sans text-label font-bold text-text-secondary" for="demo-company">
              Компания
            </label>
            <input
              class="w-full px-md py-sm rounded-sm border border-border-inverse bg-surface-elevated font-sans text-body text-text-primary transition duration-200 ease-out motion-reduce:transition-none placeholder:text-text-muted focus:border-border-brand focus:outline-none focus:shadow-focus aria-invalid:border-danger-500 aria-invalid:focus:border-danger-500"
              type="text"
              id="demo-company"
              name="company"
              placeholder="Название вашей компании"
              autocomplete="organization"
              aria-describedby="demo-company-error"
            >
            <p id="demo-company-error" class="font-sans text-small text-text-danger" hidden role="alert" data-demo-error></p>
          </div>

          <div class="flex flex-col gap-2xs">
            <label class="block font-sans text-label font-bold text-text-secondary" for="demo-phone">
              Телефон
            </label>
            <input
              class="w-full px-md py-sm rounded-sm border border-border-inverse bg-surface-elevated font-sans text-body text-text-primary transition duration-200 ease-out motion-reduce:transition-none placeholder:text-text-muted focus:border-border-brand focus:outline-none focus:shadow-focus aria-invalid:border-danger-500 aria-invalid:focus:border-danger-500"
              type="tel"
              id="demo-phone"
              name="phone"
              placeholder="+7 (999) 999-99-99"
              autocomplete="tel"
              inputmode="tel"
              data-mask="phone"
              aria-describedby="demo-phone-error"
            >
            <p id="demo-phone-error" class="font-sans text-small text-text-danger" hidden role="alert" data-demo-error></p>
          </div>

          <div class="flex flex-col gap-2xs sm:col-span-2">
            <label class="block font-sans text-label font-bold text-text-secondary" for="demo-role">
              Ваша роль <span class="text-text-brand" aria-hidden="true">*</span>
            </label>
            <div class="relative">
              <select
                class="w-full pl-md pr-4xl py-sm rounded-sm border border-border-inverse bg-surface-elevated font-sans text-body text-text-primary transition duration-200 ease-out motion-reduce:transition-none placeholder:text-text-muted focus:border-border-brand focus:outline-none focus:shadow-focus aria-invalid:border-danger-500 aria-invalid:focus:border-danger-500 appearance-none cursor-pointer"
                id="demo-role"
                name="role"
                aria-describedby="demo-role-error"
              >
                <option value="" disabled selected hidden>Выберите роль</option>
                <option value="cto">CTO / VP Engineering</option>
                <option value="em">Engineering Manager</option>
                <option value="tl">Tech Lead</option>
                <option value="dev">Developer</option>
                <option value="pm">Product Manager</option>
                <option value="other">Другое</option>
              </select>
              <svg class="absolute right-md top-1/2 h-lg w-lg -translate-y-1/2 text-text-muted pointer-events-none" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
                <use href="icons/sprite.svg#icon-chevron"></use>
              </svg>
            </div>
            <p id="demo-role-error" class="font-sans text-small text-text-danger" hidden role="alert" data-demo-error></p>
          </div>

          <div class="flex flex-col gap-2xs sm:col-span-2">
            <label class="block font-sans text-label font-bold text-text-secondary" for="demo-message">
              Сообщение
            </label>
            <textarea
              class="w-full px-md py-sm rounded-sm border border-border-inverse bg-surface-elevated font-sans text-body text-text-primary transition duration-200 ease-out motion-reduce:transition-none placeholder:text-text-muted focus:border-border-brand focus:outline-none focus:shadow-focus aria-invalid:border-danger-500 aria-invalid:focus:border-danger-500 resize-y"
              id="demo-message"
              name="message"
              placeholder="Расскажите о вашем релизном процессе..."
              rows="3"
              aria-describedby="demo-message-error"
            ></textarea>
            <p id="demo-message-error" class="font-sans text-small text-text-danger" hidden role="alert" data-demo-error></p>
          </div>

          <div class="flex flex-col gap-2xs sm:col-span-2">
            <div class="flex items-start gap-sm">
              <input
                type="checkbox"
                id="demo-consent"
                name="consent"
                required
                aria-describedby="demo-consent-error"
                data-demo-checkbox
              >
              <label class="font-sans text-small text-text-secondary cursor-pointer" for="demo-consent">
                Я согласен с <a class="text-text-brand no-underline hover:text-text-primary hover:underline focus:outline-none focus-visible:outline-none focus-visible:rounded-xs focus-visible:shadow-focus" href="privacy.html">политикой конфиденциальности</a> и обработкой данных.
              </label>
            </div>
            <p id="demo-consent-error" class="font-sans text-small text-text-danger" hidden role="alert" data-demo-error></p>
          </div>

        </div>

        <button class="inline-flex mt-2xl w-full cursor-pointer select-none items-center justify-center gap-xs whitespace-nowrap rounded-md border border-transparent bg-brand-action-vertical px-xl py-sm font-sans text-button font-bold leading-5 text-text-on-brand shadow-button transition duration-200 ease-out motion-reduce:transition-none focus:outline-none focus-visible:bg-brand-action-horizontal focus-visible:shadow-focus hover:bg-brand-action-horizontal active:translate-y-3xs disabled:cursor-not-allowed disabled:shadow-none" type="submit">
          <span>Отправить заявку</span>
        </button>
      </form>
    </div>

    <div hidden data-demo-success>
      <div class="mb-2xl flex items-start justify-end">
        <button class="flex h-3xl w-3xl shrink-0 cursor-pointer items-center justify-center rounded-sm border-0 bg-transparent p-0 text-text-muted transition duration-200 ease-out motion-reduce:transition-none hover:bg-white-alpha-08 hover:text-text-primary focus:outline-none focus-visible:shadow-focus" type="button" aria-label="Закрыть" data-demo-close>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true" focusable="false">
            <use href="icons/sprite.svg#icon-close"></use>
          </svg>
        </button>
      </div>

      <div class="flex flex-col items-center gap-lg py-xl text-center">
        <div class="flex h-4xl w-4xl items-center justify-center rounded-full border border-border-inverse bg-surface-elevated">
          <svg class="h-2xl w-2xl text-text-success" viewBox="0 0 24 24" fill="none" aria-hidden="true" focusable="false">
            <use href="icons/sprite.svg#icon-check-bold"></use>
          </svg>
        </div>
        <div class="flex flex-col gap-xs">
          <h2 class="font-sans text-mobile-h4 text-text-primary lg:text-h5">
            Заявка отправлена!
          </h2>
          <p class="text-mobile-body text-text-secondary">
            Мы получили вашу заявку и свяжемся с вами в течение 24 часов.
          </p>
        </div>
        <p class="text-small text-text-muted">
          Это демо-страница — форма работает без подключения к серверу.
        </p>
        <button class="inline-flex mt-md cursor-pointer select-none items-center justify-center gap-xs whitespace-nowrap rounded-md border border-border-brand bg-transparent px-xl py-sm font-sans text-button font-bold leading-5 text-violet-300 transition duration-200 ease-out motion-reduce:transition-none focus:outline-none focus-visible:shadow-focus hover:bg-violet-alpha-12 active:translate-y-3xs active:bg-violet-alpha-16" type="button" data-demo-close>
          Закрыть
        </button>
      </div>
    </div>

  </div>
</div>
